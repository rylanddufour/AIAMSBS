# AIAMSBS Monitoring Stack
# Deploy with: docker compose up -d

services:
  # Time-series Metrics Database
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "0.0.0.0:9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: unless-stopped

  # Log Aggregation
  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    ports:
      - "0.0.0.0:3100:3100"
    volumes:
      - ./config/loki.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    networks:
      - monitoring
    restart: unless-stopped

  # Metrics + Log Collection Agent
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "0.0.0.0:12345:12345"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
      - ./config/alloy.yml:/etc/alloy/config.yml:ro
      - alloy-data:/etc/alloy
      # Mount Hermes logs for collection
      - ${HOME}/.hermes/logs:/var/lib/hermes/logs:ro
    privileged: true
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    command: run --server.http.listen-addr=:12345 --storage.path=/etc/alloy /etc/alloy/config.yml
    networks:
      - monitoring
    restart: unless-stopped

  # Syslog Receiver for Network Devices
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "0.0.0.0:1514:514/tcp"
      - "0.0.0.0:514:514/tcp"
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    restart: unless-stopped

  # Dashboards and Visualization
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring
    restart: unless-stopped

  

networks:
  monitoring:
    name: monitoring        # fixed name so docker-compose.mcp.yml can join as external
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  alloy-data:
  grafana-data:
  portainer-data:
