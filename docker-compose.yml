# AIAMSBS Monitoring Stack
# Deploy with: docker compose up -d

services:
  # Time-series Metrics Database
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "0.0.0.0:9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/targets/:/etc/prometheus/targets/:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: unless-stopped

  # Log Aggregation
  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    ports:
      - "0.0.0.0:3100:3100"
    volumes:
      - ./config/loki.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    # Override the image default (-config.file=/etc/loki/local-config.yaml,
    # which is the image-bundled config with no retention/compactor/query
    # limits) so loki reads our project-named loki.yml. Without this the
    # mount is silently ignored — see BACKLOG #5.
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - monitoring
    restart: unless-stopped

  # Metrics + Log Collection Agent
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    # Pin the container's hostname to "aiamsbs-host" so that alloy's
    # `sys.env("HOSTNAME")` (used in the `self_host` relabel) returns the
    # canonical AIAMSBS host label. Without this, Docker defaults the
    # container hostname to the container ID, which would surface in every
    # metric's `host` label and break dashboard templating. The VM's actual
    # OS hostname (e.g. `gstack-iac` on .220 today) is a different concern;
    # the dashboards and per-host relabel contract use `aiamsbs-host` as
    # the AIAMSBS host's role-based label.
    hostname: aiamsbs-host
    ports:
      - "0.0.0.0:12345:12345"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
      - ./config/alloy.yml:/etc/alloy/config.yml:ro
      - alloy-data:/etc/alloy
      # Mount Hermes logs for collection
      - ${HOME}/.hermes/logs:/var/lib/hermes/logs:ro
      # Mount systemd journal for loki.source.journal (BACKLOG #27)
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    privileged: true
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    command: run --server.http.listen-addr=:12345 --storage.path=/etc/alloy /etc/alloy/config.yml
    networks:
      - monitoring
    restart: unless-stopped

  # Syslog Receiver for Network Devices
  # Port mapping convention (matches config/promtail.yml scrape_configs):
  #   host:514  -> container:514   (network_syslog - network devices, UDP+TCP)
  # Note: 1514 (customer_host_linux, rsyslog) and 2514 (customer_host_windows,
  # NxLog/Snare) were removed 2026-07-19 per BACKLOG #44 Step 10.
  # Customer hosts now push metrics + logs via Grafana Alloy to Prom :9090
  # and Loki :3100 directly. See docs/multi-host-monitoring.md.
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      # Network devices: TCP + UDP. Many switches/APs/firewalls default to UDP syslog.
      - "0.0.0.0:514:514/tcp"
      - "0.0.0.0:514:514/udp"
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    restart: unless-stopped

  # Customer-host Alloy (BACKLOG #44 Step 3) — simulates a customer Linux host
  # running Alloy with config/alloy/customer-linux.river. Reads from the
  # AIAMSBS host's /proc, /sys, and /var/log/journal (the AIAMSBS host itself
  # is the pilot — Steps 6/7 will cut real customer hosts over to this same
  # River config, at which point this container is removed). Runs ALONGSIDE
  # the AIAMSBS-side alloy so both paths produce metrics + logs simultaneously
  # for parity verification (Step 4). Different UI port (12346) to avoid
  # colliding with the existing alloy container on 12345. Pin the
  # container hostname to `aiamsbs-host` so the pilot's labels match the
  # AIAMSBS-side alloy in the per-host dashboard (both end up with
  # `host="aiamsbs-host"`). For real customer Docker installs, drop this
  # override and let Docker resolve from the OS hostname.
  alloy-customer:
    image: grafana/alloy:latest
    container_name: alloy-customer
    hostname: aiamsbs-host
    ports:
      - "0.0.0.0:12346:12345"
    volumes:
      # Required for prometheus.exporter.unix to read host metrics
      - /proc:/proc:ro
      - /sys:/sys:ro
      # Required for loki.source.journal
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      # The customer River config from Step 1
      - ./config/alloy/customer-linux.river:/etc/alloy/config.river:ro
      - alloy-customer-data:/etc/alloy
    privileged: true
    environment:
      # The container's `host` label resolves to whatever HOSTNAME is set to
      # via alloy's `sys.env("HOSTNAME")` (see config/alloy/customer-linux.river).
      # On .220 the docker daemon auto-sets HOSTNAME to /etc/hostname of the
      # host (`aiamsbs-host`), so the pilot parity box picks up the same label
      # as the AIAMSBS-side alloy without an explicit override. For a real
      # customer install, set `- HOSTNAME=<customer-hostname>` (or let Docker
      # resolve it from the OS hostname on bare-metal).
      # Default URLs match the in-network targets (config/alloy/customer-linux.river
      # uses coalesce() to honor these env vars if set).
      - ALLOY_REMOTE_WRITE_URL=http://prometheus:9090/api/v1/write
      - ALLOY_LOKI_URL=http://loki:3100/loki/api/v1/push
    command: run --server.http.listen-addr=:12345 --storage.path=/etc/alloy /etc/alloy/config.river
    networks:
      - monitoring
    restart: unless-stopped

  # Dashboards and Visualization
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-polystat-panel
    networks:
      - monitoring
    restart: unless-stopped

  # Blackbox Exporter — HTTP/TCP probes for service health
  # network_mode: host so probes can hit localhost endpoints
  # (Grafana, Loki, Prometheus, Alloy, Hermes Dashboard, MCP servers, Promtail syslog)
  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox_exporter
    network_mode: host
    cap_add:
      - NET_RAW    # BACKLOG #39.5: required for ICMP probing in the blackbox_inventory job
    ports:
      - "0.0.0.0:9115:9115"
    volumes:
      - ./config/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
    # Override the image's default --config.file=/etc/blackbox_exporter/config.yml
    # so it reads our project-named blackbox.yml.
    command:
      - '--config.file=/etc/blackbox_exporter/blackbox.yml'
    restart: unless-stopped



networks:
  monitoring:
    name: monitoring        # fixed name so docker-compose.mcp.yml can join as external
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  alloy-data:
  alloy-customer-data:
  grafana-data:
