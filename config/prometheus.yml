# Prometheus Configuration for AIAMSBS Monitoring Stack

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'aiamsbs'
    environment: 'production'

# Scrape Prometheus itself
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'alloy'
    static_configs:
      - targets: ['alloy:12345']
        labels:
          service: 'alloy'
    # BACKLOG #10 / #B: Alloy runs prometheus.exporter.unix "self" inside the container
    # and remote_writes the AIAMSBS host metrics to this Prometheus. The exporter does
    # not emit a `host` label, so the per-host dashboard (aiamsbs-node-exporter) cannot
    # filter on it. Relabel a stable hostname onto every Alloy-sourced metric so the
    # dropdown selector in the node_exporter dashboard has at least one entry to find.
    relabel_configs:
      - target_label: host
        replacement: 'aiamsbs-host'

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'

  # Blackbox HTTP probes — success on 2xx (readiness/health endpoints + MCP roots)
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - http://localhost:3000/api/health     # Grafana UI
          - http://localhost:3100/ready          # Loki
          - http://localhost:9090/-/ready        # Prometheus
          - http://localhost:12345/-/ready       # Alloy
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        # Prometheus runs on the 'monitoring' docker bridge network, but
        # blackbox_exporter uses host network so it can hit localhost services.
        # Reach it via the host's external IP. Override per-host via env if needed.
        replacement: 192.168.0.220:9115

  # Blackbox HTTP probes — MCP servers return 404 at "/" but are healthy.
  # 2xx or 404 both count as up; 5xx still fails.
  - job_name: 'blackbox_mcp'
    metrics_path: /probe
    params:
      module: [http_2xx_or_404]
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - http://localhost:8001/               # Inventory MCP
          - http://localhost:8000/               # Grafana MCP
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        # Prometheus runs on the 'monitoring' docker bridge network, but
        # blackbox_exporter uses host network so it can hit localhost services.
        # Reach it via the host's external IP. Override per-host via env if needed.
        replacement: 192.168.0.220:9115

  # Blackbox HTTP probes — success on 2xx OR 3xx (redirects expected)
  # Hermes Dashboard /login redirects (302 → /) — see server.py send_redirect.
  - job_name: 'blackbox_login'
    metrics_path: /probe
    params:
      module: [http_2xx_login]
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - http://localhost:9119/login          # Hermes Dashboard
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.220:9115

  # Blackbox TCP probes — Promtail syslog receiver
  - job_name: 'blackbox_tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - localhost:514                       # Promtail syslog
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.220:9115

  # Blackbox exporter self-metrics (probe_duration_seconds histogram, etc.)
  - job_name: 'blackbox_exporter'
    static_configs:
      - targets: ['192.168.0.220:9115']
        labels:
          service: 'blackbox_exporter'

  # Multi-host node_exporter scrape. Customers add their own entries here as
  # they install node_exporter on each managed host.
  #
  # Architectural decision (Ryland 2026-07-06): the AIAMSBS host itself is NOT
  # scraped via this job. Its host metrics come through Alloy's
  # `prometheus.exporter.unix "self"` (see job `alloy` above), which
  # remote_writes to this Prometheus under job="integrations/unix". Adding a
  # node_exporter to the AIAMSBS host is intentionally out of scope — the
  # Alloy path is the canonical way to monitor the AIAMSBS host and ships
  # to customer VMs out of the box.
  #
  # The Linux dashboard's $host variable filters on `up{job="node_exporter"}`
  # and therefore only lists Linux hosts that have an actual node_exporter
  # installed (i.e. customer Linux machines). Windows hosts use a separate
  # `windows_exporter` job (see BACKLOG #35).
  # Customer Linux hosts (node_exporter binary on port 9100).
  # This job ships EMPTY out of the box — no customer targets are pre-configured.
  # To add a host, prompt the AIAMSBS agent:
  #     "add linux_exporter target <ip:9100> with hostname <name>"
  # The agent will add a `static_configs` entry below and trigger a Prometheus
  # reload (POST /-/reload). One block per host.
  - job_name: 'linux_exporter'
    honor_labels: true
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      # Example (uncomment + edit, or prompt the agent to add):
      #   - targets: ['<linux-host-ip>:9100']
      #     labels:
      #       host: <linux-hostname>

  # Customer Windows hosts (windows_exporter on port 9182).
  # This job ships EMPTY out of the box — no customer targets are pre-configured.
  # To add a host, prompt the AIAMSBS agent:
  #     "add windows_exporter target <ip:9182> with hostname <name>"
  # The agent will add a `static_configs` entry below and trigger a Prometheus
  # reload (POST /-/reload). One block per host.
  - job_name: 'windows_exporter'
    honor_labels: true
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      # Example (uncomment + edit, or prompt the agent to add):
      #   - targets: ['<windows-host-ip>:9182']
      #     labels:
      #       host: <windows-hostname>

  # Blackbox ICMP probes for inventory-discovered hosts.
  # Targets are written to config/prometheus/targets/blackbox_inventory.json
  # by profiles/it_admin/scripts/regenerate_blackbox.py (cron @ 02:00 daily
  # + manual kickoff + bootstrap end-of-install kickoff). The bind mount in
  # docker-compose.yml exposes the host dir to /etc/prometheus/targets/ in
  # the container. file_sd_configs re-reads the file on every scrape, so
  # the inventory-driven targets are picked up without a container restart.
  # Note: do NOT hardcode the 192.168.0.220:9115 replacement — that value
  # is correct for the canonical AIAMSBS .220 deployment; on other hosts,
  # override via the BLACKBOX_EXPORTER_HOST env var on the prometheus
  # container. (Out of scope for v1 — single-host deployment.)
  - job_name: 'blackbox_inventory'
    metrics_path: /probe
    params:
      module: [icmp]
    scrape_interval: 60s
    scrape_timeout: 10s
    file_sd_configs:
      - files: ['/etc/prometheus/targets/blackbox_inventory*.json']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.220:9115

