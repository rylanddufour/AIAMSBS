# Prometheus Configuration for AIAMSBS Monitoring Stack

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'aiamsbs'
    environment: 'production'

# Scrape Prometheus itself
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'alloy'
    static_configs:
      - targets: ['alloy:12345']
        labels:
          service: 'alloy'

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
        labels:
          service: 'traefik'

  - job_name: 'portainer'
    static_configs:
      - targets: ['portainer:9000']
        labels:
          service: 'portainer'

  - job_name: 'hermes-webui'
    static_configs:
      - targets: ['hermes-webui:8787']
        labels:
          service: 'hermes-webui'

# Remote write configuration for Alloy
remote_write:
  - url: 'http://prometheus:9090/api/v1/write'
    # Accepts metrics from Alloy via remote write