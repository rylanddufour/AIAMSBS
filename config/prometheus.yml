# Prometheus Configuration for AIAMSBS Monitoring Stack

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'aiamsbs'
    environment: 'production'

# Scrape Prometheus itself
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'alloy'
    static_configs:
      - targets: ['alloy:12345']
        labels:
          service: 'alloy'
    # BACKLOG #10 / #B: Alloy runs prometheus.exporter.unix "self" inside the container
    # and remote_writes the AIAMSBS host metrics to this Prometheus. The exporter
    # does not emit a `host` label on its own, but Alloy stamps one on via
    # `prometheus.relabel "self_host"` in config/alloy.yml (using
    # `sys.env("HOSTNAME")` — resolves to the Docker container hostname, which
    # Docker auto-sets from /etc/hostname of the host). Real customer hosts
    # have their own hostnames picked up the same way.

  # Customer-host Alloy (BACKLOG #44 Step 3) — runs config/alloy/customer-linux.river.
  # In dual-collect mode, this container runs ALONGSIDE the AIAMSBS-side alloy so
  # we can verify parity before cutting customer hosts over to Alloy. The container
  # exposes the same Alloy self-metrics on port 12345; we scrape them on the
  # `monitoring` docker network. The customer-side alloy itself sets the `host`
  # label via the same `prometheus.relabel "customer_host"` block in
  # config/alloy/customer-linux.river (resolving to that customer host's
  # `sys.env("HOSTNAME")`), so no Prometheus-side relabel is needed here.
  - job_name: 'alloy-customer'
    static_configs:
      - targets: ['alloy-customer:12345']
        labels:
          service: 'alloy-customer'

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'

  # Blackbox HTTP probes — success on 2xx (readiness/health endpoints + MCP roots)
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - http://localhost:3000/api/health     # Grafana UI
          - http://localhost:3100/ready          # Loki
          - http://localhost:9090/-/ready        # Prometheus
          - http://localhost:12345/-/ready       # Alloy
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        # Prometheus runs on the 'monitoring' docker bridge network, but
        # blackbox_exporter uses host network so it can hit localhost services.
        # Reach it via the host's external IP. Override per-host via env if needed.
        replacement: 192.168.0.220:9115

  # Blackbox HTTP probes — MCP servers return 404 at "/" but are healthy.
  # 2xx or 404 both count as up; 5xx still fails.
  - job_name: 'blackbox_mcp'
    metrics_path: /probe
    params:
      module: [http_2xx_or_404]
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - http://localhost:8001/               # Inventory MCP
          - http://localhost:8000/               # Grafana MCP
          - http://localhost:8002/               # Knowledge Base MCP
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        # Prometheus runs on the 'monitoring' docker bridge network, but
        # blackbox_exporter uses host network so it can hit localhost services.
        # Reach it via the host's external IP. Override per-host via env if needed.
        replacement: 192.168.0.220:9115

  # Blackbox HTTP probes — success on 2xx OR 3xx (redirects expected)
  # Hermes Dashboard /login redirects (302 → /) — see server.py send_redirect.
  - job_name: 'blackbox_login'
    metrics_path: /probe
    params:
      module: [http_2xx_login]
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - http://localhost:9119/login          # Hermes Dashboard
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.220:9115

  # Blackbox TCP probes — Promtail syslog receiver
  - job_name: 'blackbox_tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - localhost:514                       # Promtail syslog
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.220:9115

  # Blackbox exporter self-metrics (probe_duration_seconds histogram, etc.)
  - job_name: 'blackbox_exporter'
    static_configs:
      - targets: ['192.168.0.220:9115']
        labels:
          service: 'blackbox_exporter'

  # NOTE: legacy linux_exporter / windows_exporter jobs were removed on 2026-07-19
  # after BACKLOG #44 Steps 6 + 7 (alloy cutover). Customer-host metrics now flow
  # through alloy's prometheus.remote_write under job="integrations/unix" /
  # job="integrations/windows" (see alloy / alloy-customer scrape jobs above).
  # The Linux / Windows Grafana dashboards use those alloy labels too
  # (verified: dashboards node-exporter.json + node-exporter-windows.json
  # $host variable queries use label_values(up{job="integrations/unix"}, host)
  # and label_values(up{job="integrations/windows"}, host) respectively).
  # If a customer host is later installed with raw node_exporter / windows_exporter
  # instead of alloy, add the target directly to the integrations/unix or
  # integrations/windows job (alloy's labels are the canonical scheme).

  # Blackbox ICMP probes for inventory-discovered hosts.
  # Targets are written to config/prometheus/targets/blackbox_inventory.json
  # by profiles/it_admin/scripts/regenerate_blackbox.py (cron @ 02:00 daily
  # + manual kickoff + bootstrap end-of-install kickoff). The bind mount in
  # docker-compose.yml exposes the host dir to /etc/prometheus/targets/ in
  # the container. file_sd_configs re-reads the file on every scrape, so
  # the inventory-driven targets are picked up without a container restart.
  # Note: do NOT hardcode the 192.168.0.220:9115 replacement — that value
  # is correct for the canonical AIAMSBS .220 deployment; on other hosts,
  # override via the BLACKBOX_EXPORTER_HOST env var on the prometheus
  # container. (Out of scope for v1 — single-host deployment.)
  - job_name: 'blackbox_inventory'
    metrics_path: /probe
    params:
      module: [icmp]
    scrape_interval: 60s
    scrape_timeout: 10s
    file_sd_configs:
      - files: ['/etc/prometheus/targets/blackbox_inventory*.json']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.220:9115

