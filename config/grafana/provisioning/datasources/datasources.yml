# Grafana Datasources Configuration
# Auto-provisioned on first startup

apiVersion: 1

datasources:
  - name: Prometheus
    uid: aiamsbs-prom
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST

  - name: Loki
    uid: aiamsbs-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      httpMethod: POST
      # BACKLOG #45 resolved (config/loki.yml: auth_enabled: false): Loki is
      # now in single-tenant mode, so this datasource no longer needs to send
      # an X-Scope-OrgID header. The earlier httpHeaderName1 + secureJsonData
      # workaround landed in PR #28 and is removed here.

  # Required for Grafana 13 Unified Alerting file-provisioned rules.
  # The threshold/reduce expression engine (UID "__expr") is not auto-registered
  # in Grafana 13.0.x on a fresh install. Without this stub entry, every alert
  # rule with a threshold condition fails evaluation with:
  #   "failed to build query 'C': data source not found"
  #   "the result-set has errors that can be retried: [plugin.notRegistered]"
  # Pointing it at the built-in "mixed" data source type wires the
  # expression engine in. Not user-editable.
  - name: Expression
    uid: __expr
    type: mixed
    access: proxy
    editable: false
    jsonData: {}