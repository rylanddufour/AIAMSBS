// Alloy Configuration for AIAMSBS Monitoring Stack

// Host metrics collection
prometheus.exporter.unix "self" { }

// Scrape host metrics
prometheus.scrape "host" {
    targets = prometheus.exporter.unix.self.targets
    forward_to = [prometheus.remote_write.metrics.receiver]
    scrape_interval = "15s"
    scrape_timeout = "10s"
}

// Remote write to Prometheus
prometheus.remote_write "metrics" {
    endpoint {
        url = "http://prometheus:9090/api/v1/write"
    }
}

// Docker service discovery
discovery.docker "containers" {
    host = "unix:///var/run/docker.sock"
}

// Collect Docker container logs
loki.source.docker "containers" {
    host = "unix:///var/run/docker.sock"
    targets = discovery.docker.containers.targets
    labels = {
        job = "docker",
        source = "aiamsbs_host",
    }
    forward_to = [loki.write.docker.receiver]
}

// Collect systemd journal logs
loki.source.journal "systemd" {
    labels = {
        job = "systemd",
        source = "aiamsbs_host",
    }
    forward_to = [loki.write.systemd.receiver]
}

// Write Docker logs to Loki
loki.write "docker" {
    endpoint {
        url = "http://loki:3100/loki/api/v1/push"
    }
}

// Write systemd logs to Loki
loki.write "systemd" {
    endpoint {
        url = "http://loki:3100/loki/api/v1/push"
    }
}

// ---------------------------------------------------------------------------
// Hermes agent activity (BACKLOG #29 — research/agent-activity-dashboard-2026-07-01.md)
//
// Tails the Hermes agent log (mounted read-only via docker-compose) into Loki
// so the dashboard's "Live logs" panel can show recent activity. The Python
// agent-exporter service (services/agent-exporter/, port 9117) carries the
// numeric metrics from state.db + kanban.db + cron/jobs.json — see Prometheus
// scrape config for `agent-exporter` job in config/prometheus.yml.
//
// PRIVACY DEFAULT: the agent.log line format includes structured per-API-call
// token + latency data, but does NOT include the user/assistant message
// content. The raw log line is forwarded to Loki so operators can scan recent
// activity, but no prompt body is parsed or exposed in metrics.
//
// Future work: alloy loki.process stage.metrics can derive 6 log-derived
// counters/histograms (api calls, tool latencies, errors) without Python.
// Deferred to a follow-up so v1 ships with the SQLite-derived metrics only.
// ---------------------------------------------------------------------------

// File matcher for the Hermes agent log
local.file_match "hermes_agent_log" {
    path_targets = [{
        __path__ = "/var/lib/hermes/logs/agent.log",
    }]
}

// Tail agent.log → forward raw lines to Loki
loki.source.file "hermes_agent_log" {
    targets    = local.file_match.hermes_agent_log.targets
    labels     = { job = "hermes-agent", source = "hermes_agent" }
    forward_to = [loki.write.hermes_agent.receiver]
}

// Write Hermes agent log to Loki
loki.write "hermes_agent" {
    endpoint {
        url = "http://loki:3100/loki/api/v1/push"
    }
}