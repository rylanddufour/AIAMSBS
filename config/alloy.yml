// Alloy Configuration for AIAMSBS Monitoring Stack

// Host metrics collection
prometheus.exporter.unix "self" { }

// Scrape host metrics
prometheus.scrape "host" {
    targets = prometheus.exporter.unix.self.targets
    forward_to = [prometheus.relabel.self_host.receiver]
    scrape_interval = "15s"
    scrape_timeout = "10s"
}

// Stamp the AIAMSBS host's hostname onto every metric so the per-host dashboard
// dropdown has a stable, accurate `host` label. Mirrors the pattern in
// config/alloy/customer-linux.river so the AIAMSBS-host and customer-host
// alloys label themselves the same way. On Docker this resolves to the
// container hostname (set automatically by dockerd to /etc/hostname of the
// host — `aiamsbs-host` on .220). On bare-metal customer installs it picks
// up whatever HOSTNAME is set to (often FQDN). To override, pass
// `- HOSTNAME=<name>` on the alloy container's environment block.
prometheus.relabel "self_host" {
    rule {
        target_label = "host"
        replacement  = sys.env("HOSTNAME")
    }

    forward_to = [prometheus.remote_write.metrics.receiver]
}

// Remote write to Prometheus
prometheus.remote_write "metrics" {
    endpoint {
        url = "http://prometheus:9090/api/v1/write"
    }
}

// Docker service discovery
discovery.docker "containers" {
    host = "unix:///var/run/docker.sock"
}

// Collect Docker container logs
loki.source.docker "containers" {
    host = "unix:///var/run/docker.sock"
    targets = discovery.docker.containers.targets
    labels = {
        job = "docker",
        source = "aiamsbs_host",
    }
    forward_to = [loki.write.docker.receiver]
}

// Collect systemd journal logs
loki.source.journal "systemd" {
    labels = {
        job = "systemd",
        source = "aiamsbs_host",
    }
    forward_to = [loki.write.systemd.receiver]
}

// Write Docker logs to Loki
loki.write "docker" {
    endpoint {
        url = "http://loki:3100/loki/api/v1/push"
    }
}

// Write systemd logs to Loki
loki.write "systemd" {
    endpoint {
        url = "http://loki:3100/loki/api/v1/push"
    }
}