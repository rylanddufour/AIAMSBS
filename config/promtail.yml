server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Port convention (DO NOT change without BACKLOG update):
#   514  = network devices  (source: network_device)       [Cisco/UniFi/Aruba/OPNsense]
#
# Note: 1514 (customer_host_linux) and 2514 (customer_host_windows) were removed
# 2026-07-19 as part of BACKLOG #44 Step 10 — customer hosts now push
# metrics + logs via Grafana Alloy to Prom :9090 and Loki :3100 directly.
# See docs/multi-host-monitoring.md for the alloy install path.

scrape_configs:
  # Network device syslog (OPNsense, switches, APs, etc.) — sent TO this port by devices.
  - job_name: network_syslog
    syslog:
      listen_address: 0.0.0.0:514
      idle_timeout: 60s
      label_structured_data: yes
      labels:
        job: network_syslog
        source: network_device
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'host'
      - source_labels: ['__syslog_message_severity']
        target_label: 'severity'
      - source_labels: ['__syslog_message_app_name']
        target_label: 'app'
      - source_labels: ['__syslog_message_facility']
        target_label: 'facility'
