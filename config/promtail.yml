server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Port convention (DO NOT change without BACKLOG update):
#   514  = network devices  (source: network_device)       [Cisco/UniFi/Aruba/OPNsense]
#   1514 = customer Linux   (source: customer_host_linux)  [rsyslog]
#   2514 = customer Windows (source: customer_host_windows) [NxLog/Snare/Event Log forwarders]

scrape_configs:
  # Network device syslog (OPNsense, switches, APs, etc.) — sent TO this port by devices.
  - job_name: network_syslog
    syslog:
      listen_address: 0.0.0.0:514
      idle_timeout: 60s
      label_structured_data: yes
      labels:
        job: network_syslog
        source: network_device
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'host'
      - source_labels: ['__syslog_message_severity']
        target_label: 'severity'
      - source_labels: ['__syslog_message_app_name']
        target_label: 'app'
      - source_labels: ['__syslog_message_facility']
        target_label: 'facility'

  # Customer Linux host syslog (rsyslog forwarding sshd, systemd, cron, kernel, etc.)
  - job_name: customer_host_linux
    syslog:
      listen_address: 0.0.0.0:1514
      idle_timeout: 60s
      label_structured_data: yes
      labels:
        job: customer_host_linux
        source: customer_host_linux
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'host'
      - source_labels: ['__syslog_message_severity']
        target_label: 'severity'
      - source_labels: ['__syslog_message_app_name']
        target_label: 'app'
      - source_labels: ['__syslog_message_facility']
        target_label: 'facility'

  # Customer Windows host syslog (NxLog/Snare converting WinEventLog → syslog over TCP)
  # Windows event messages can contain literal newlines; Promtail handles them, and the
  # `app=MSWinEventLog` label makes them filterable in Loki/Grafana.
  - job_name: customer_host_windows
    syslog:
      listen_address: 0.0.0.0:2514
      idle_timeout: 60s
      label_structured_data: yes
      labels:
        job: customer_host_windows
        source: customer_host_windows
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'host'
      - source_labels: ['__syslog_message_severity']
        target_label: 'severity'
      - source_labels: ['__syslog_message_app_name']
        target_label: 'app'
      - source_labels: ['__syslog_message_facility']
        target_label: 'facility'
