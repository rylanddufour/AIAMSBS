# Loki Configuration for AIAMSBS Monitoring Stack
# Local configuration (no auth, no persistence)
#
# BACKLOG #45: loki 3.x's compiled-in default is multi-tenant mode when this
# field is absent — every writer (alloy / promtail / Grafana) would need to
# send X-Scope-OrgID or get a 401. AIAMSBS is single-tenant (one VM, one
# stack), so disable auth at the source. Any writer can push with no
# tenant header; queries run against the single default tenant.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # BACKLOG #5: enforce 90-day global retention (was: no compactor configured,
  # chunks accumulated until disk filled). Single-tenant config, single policy
  # for all streams (aiamsbs_host, network_device, future hermes-*).
  retention_period: 2160h
  max_streams_matchers_per_query: 1000
  max_entries_limit_per_query: 5000
  allow_structured_metadata: false

# Compactor: enabled to enforce the limits_config.retention_period above.
# Loki 3.x runs the compactor in-process when retention_enabled is true
# and working_directory is set; no separate container needed.
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  compaction_interval: 10m
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
