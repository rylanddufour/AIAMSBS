version: '3.8'

# MCP Servers for Hermes Infrastructure Agent
# Start with: docker compose -f docker-compose.mcp.yml up -d

services:
  # Docker MCP Server - Container management
  docker-mcp:
    image: ghcr.io/docker/mcp-gateway:latest
    container_name: docker-mcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - hermes-network
    restart: unless-stopped

  # Prometheus MCP Server - Metrics queries
  prometheus-mcp:
    image: ghcr.io/pab1it0/prometheus-mcp-server:latest
    container_name: prometheus-mcp
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    networks:
      - hermes-network
    restart: unless-stopped
    # Note: Requires Prometheus to be running at prometheus:9090

  # GitHub MCP Server - Repository operations
  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: github-mcp
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    networks:
      - hermes-network
    restart: unless-stopped
    # Note: Requires GITHUB_PERSONAL_ACCESS_TOKEN in .env

  # PostgreSQL MCP Server - Database operations
  postgres-mcp:
    image: crystaldba/postgres-mcp:latest
    container_name: postgres-mcp
    environment:
      - DATABASE_URI=${POSTGRES_MCP_DATABASE_URI}
    networks:
      - hermes-network
    restart: unless-stopped
    # Note: Requires POSTGRES_MCP_DATABASE_URI in .env

  # Filesystem MCP Server - File operations
  filesystem-mcp:
    image: ghcr.io/mcp-servers/filesystem-mcp:latest
    container_name: filesystem-mcp
    volumes:
      - /:/workspace:ro
    environment:
      - ALLOWED_DIRECTORIES=/workspace,/home
    networks:
      - hermes-network
    restart: unless-stopped

networks:
  hermes-network:
    driver: bridge