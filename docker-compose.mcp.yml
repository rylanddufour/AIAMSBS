# MCP Servers for Hermes Agent (AIAMSBS deployment)
#
# Deployed by bootstrap.sh's deploy_mcp_stack() after the main monitoring
# stack is up. Brings in only the Grafana MCP server for now.
#
# Requires:
#   - Main docker-compose.yml stack running (grafana on `monitoring` network)
#   - ~/.hermes/secrets/grafana-mcp.env containing GRAFANA_SERVICE_ACCOUNT_TOKEN
#     (auto-created by bootstrap.sh's create_grafana_mcp_service_account)

services:
  # Grafana MCP server — multi-client HTTP transport on port 8000
  grafana-mcp:
    image: grafana/mcp-grafana:latest
    container_name: grafana-mcp
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - GRAFANA_URL=http://grafana:3000          # uses docker DNS, not localhost
      # GRAFANA_SERVICE_ACCOUNT_TOKEN is passed by deploy_mcp_stack via sudo -E
    command: ["-t", "streamable-http"]           # SSE is legacy; streamable-http is the standard
    networks:
      - monitoring                               # joins main stack's network
    restart: unless-stopped

networks:
  monitoring:
    external: true
    name: monitoring
