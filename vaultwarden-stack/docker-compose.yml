# AIAMSBS Runtime Vault — vaultwarden + bitwarden/mcp-server.
#
# BACKLOG #48 + #49. Self-hosted password/secret vault for the AIAMSBS
# host. vaultwarden provides the customer-facing web vault (admin panel
# + day-to-day UI). bitwarden-mcp provides MCP-protocol access for
# the agent (used by kb_ingest_share, BACKLOG #50).
#
# Network: joins the `monitoring` external docker network so the
# bitwarden-mcp container can reach vaultwarden by service name. No
# ports are published for bitwarden-mcp (stdio only); vaultwarden is
# published on 127.0.0.1:8003 for the customer's browser.

services:
  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:80"             # web vault UI, host-local only
    volumes:
      - vaultwarden-data:/data          # SQLite/attachments
      - /etc/vaultwarden/admin-token:/etc/admin-token:ro  # admin token from bootstrap
    environment:
      # Bootstrap-generated admin token (see generate-admin-token.sh).
      # vaultwarden reads this on every startup; rotate by regenerating
      # the host file and restarting the container.
      - ADMIN_TOKEN_FILE=/etc/admin-token

      # Customer-creates-first-user UX. Disable signups; customer uses
      # the admin token to create the first user via /admin. See README.
      - SIGNUPS_ALLOWED=false
      - INVITATIONS_ALLOWED=false

      # Reasonable defaults for an unattended small-shop install.
      - LOG_LEVEL=info
      - DOMAIN=http://localhost:8003
    networks:
      - monitoring
    healthcheck:
      # /alive is vaultwarden's documented unauthenticated healthcheck
      # endpoint — returns 200 OK with body "alive\n".
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/alive"]
      interval: 10s
      timeout: 5s
      retries: 3

  bitwarden-mcp:
    build:
      context: ./bitwarden-mcp
      dockerfile: Dockerfile
    image: aiamsbs_bitwarden-mcp
    container_name: bitwarden-mcp
    restart: unless-stopped
    depends_on:
      - vaultwarden
    env_file:
      - /etc/bitwarden-mcp.env         # BW_USER, BW_PASSWORD, BW_API_BASE_URL, BW_IDENTITY_URL
    volumes:
      - bitwarden-cli-config:/var/lib/bitwarden-cli  # persistent BW_SESSION cache
    networks:
      - monitoring

    # stdio MCP server — Hermes reaches it via `docker exec -i bitwarden-mcp
    # mcp-server-bitwarden --stdio`. NO published ports.
    stdin_open: true
    tty: true
    # No `ports:` key — by design.

volumes:
  vaultwarden-data:
  bitwarden-cli-config:

networks:
  monitoring:
    external: true
